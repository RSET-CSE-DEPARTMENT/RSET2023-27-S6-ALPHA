<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>ClassSense – Teacher Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #e0edff 0, #020617 40%, #020617 100%);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .cs-card {
      background: rgba(15, 23, 42, 0.92);
      border-radius: 1.25rem;
      border: 1px solid rgba(148, 163, 184, 0.35);
      box-shadow: 0 24px 64px rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(18px);
    }

    .form-control,
    .form-control:focus,
    .form-select,
    .form-select:focus {
      background-color: #020617;
      border-color: #1e293b;
      color: #e5e7eb;
      border-radius: 0.6rem;
    }

    .form-control::placeholder {
      color: #6b7280;
    }

    .nav-tabs {
      border-bottom: 1px solid #1e293b;
    }

    .nav-tabs .nav-link {
      color: #6b7280;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 0.5rem 1rem;
      font-weight: 500;
    }

    .nav-tabs .nav-link.active {
      color: #3b82f6;
      background: transparent;
      border-bottom: 2px solid #3b82f6;
    }

    .form-label {
      font-weight: 500;
    }

    .btn-google {
      background: #ffffff;
      color: #3c4043;
      border: 1px solid #dadce0;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .btn-google:hover {
      background: #f7f8f8;
      box-shadow: 0 1px 3px rgba(60, 64, 67, 0.3);
      color: #3c4043;
    }

    .btn-google svg {
      width: 18px;
      height: 18px;
    }

    /* ===== TOAST NOTIFICATION SYSTEM ===== */
    .cs-toast-container {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-width: 400px;
    }

    .cs-toast {
      padding: 1rem 1.25rem;
      border-radius: 0.85rem;
      color: #fff;
      font-size: 0.9rem;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      animation: csToastIn 0.35s ease;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .cs-toast.cs-toast-out {
      animation: csToastOut 0.3s ease forwards;
    }

    .cs-toast-success {
      background: rgba(22, 101, 52, 0.92);
      border-color: rgba(34, 197, 94, 0.3);
    }

    .cs-toast-error {
      background: rgba(153, 27, 27, 0.92);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .cs-toast-warning {
      background: rgba(146, 64, 14, 0.92);
      border-color: rgba(234, 179, 8, 0.3);
    }

    .cs-toast-info {
      background: rgba(30, 64, 175, 0.92);
      border-color: rgba(59, 130, 246, 0.3);
    }

    .cs-toast i {
      font-size: 1.1rem;
      margin-top: 0.1rem;
    }

    .cs-toast-content {
      flex: 1;
    }

    .cs-toast-title {
      font-weight: 600;
      margin-bottom: 0.15rem;
    }

    .cs-toast-msg {
      font-size: 0.82rem;
      opacity: 0.9;
    }

    .cs-toast-close {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
      line-height: 1;
    }

    .cs-toast-close:hover {
      color: #fff;
    }

    @keyframes csToastIn {
      from {
        opacity: 0;
        transform: translateX(40px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes csToastOut {
      from {
        opacity: 1;
        transform: translateX(0);
      }

      to {
        opacity: 0;
        transform: translateX(40px);
      }
    }
  </style>
</head>

<body>

  <!-- Toast Container -->
  <div class="cs-toast-container" id="toastContainer"></div>

  <div class="container px-3">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="cs-card p-4 p-md-5">

          <div class="d-flex align-items-center gap-2 mb-3">
            <div
              class="rounded-circle bg-primary-subtle text-primary d-inline-flex align-items-center justify-content-center"
              style="width:34px;height:34px;">
              <i class="fa-solid fa-chalkboard-user"></i>
            </div>
            <div>
              <div class="fw-semibold text-primary">ClassSense</div>
              <div class="small text-secondary">Teacher Access</div>
            </div>
          </div>

          <h1 class="h4 mb-2">Welcome, teacher</h1>
          <p class="small text-secondary mb-4">
            Sign in or create a new account to access the dashboard.
          </p>

          <ul class="nav nav-tabs mb-4" id="authTabs" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button"
                role="tab" aria-selected="true">Login</button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button"
                role="tab" aria-selected="false">Register</button>
            </li>
          </ul>

          <div class="tab-content" id="authTabsContent">
            <!-- COMMON FIELDS FOR BOTH TABS -->
            <div class="mb-3">
              <label class="form-label small text-secondary">Email</label>
              <input type="email" id="email" class="form-control form-control-sm" placeholder="teacher@example.com">
            </div>

            <div class="mb-3">
              <label class="form-label small text-secondary">Password</label>
              <input type="password" id="password" class="form-control form-control-sm" placeholder="••••••••">
            </div>

            <div class="row g-2 mb-3">
              <div class="col-6">
                <label class="form-label small text-secondary">Class Name</label>
                <input type="text" id="className" class="form-control form-control-sm" placeholder="e.g. CS-A">
              </div>
              <div class="col-6">
                <label class="form-label small text-secondary">Role</label>
                <select id="teacherRole" class="form-select form-select-sm" onchange="toggleSubjectField()">
                  <option value="Subject Teacher">Subject Teacher</option>
                  <option value="Class Teacher">Class Teacher</option>
                </select>
              </div>
            </div>

            <div class="mb-4" id="subjectFieldGroup">
              <label class="form-label small text-secondary">Subject Name</label>
              <input type="text" id="subjectName" class="form-control form-control-sm" placeholder="e.g. Data Structures">
            </div>

            <!-- LOGIN TAB -->
            <div class="tab-pane fade show active" id="login" role="tabpanel" aria-labelledby="login-tab">
              <div class="d-grid gap-2 mb-3">
                <button id="loginBtn" class="btn btn-primary btn-sm">
                  <i class="fa-solid fa-right-to-bracket me-2"></i> Login with Email
                </button>
                <button id="googleLoginBtn" class="btn btn-google btn-sm">
                  <svg viewBox="0 0 48 48">
                    <path fill="#EA4335"
                      d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                    <path fill="#4285F4"
                      d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                    <path fill="#FBBC05"
                      d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.9 7.35 2.56 10.53l7.97-5.94z" />
                    <path fill="#34A853"
                      d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.94C6.51 42.62 14.62 48 24 48z" />
                  </svg>
                  Login with Google
                </button>
              </div>
            </div>

            <!-- REGISTER TAB -->
            <div class="tab-pane fade" id="register" role="tabpanel" aria-labelledby="register-tab">
              <div class="mb-3">
                <label class="form-label small text-secondary">Full Name (Only for Registration)</label>
                <input type="text" id="fullName" class="form-control form-control-sm"
                  placeholder="Enter your full name">
              </div>
              <div class="d-grid gap-2 mb-3">
                <button id="registerBtn" class="btn btn-success btn-sm">
                  <i class="fa-solid fa-user-plus me-2"></i> Register Account & Role
                </button>
                <button id="googleRegisterBtn" class="btn btn-google btn-sm">
                  <svg viewBox="0 0 48 48">
                    <path fill="#EA4335"
                      d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                    <path fill="#4285F4"
                      d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                    <path fill="#FBBC05"
                      d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.9 7.35 2.56 10.53l7.97-5.94z" />
                    <path fill="#34A853"
                      d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.94C6.51 42.62 14.62 48 24 48z" />
                  </svg>
                  Register with Google
                </button>
              </div>
            </div>
          </div>

          <p class="small text-secondary mt-3 mb-0 text-center">
            By proceeding, you agree to our terms and conditions.
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBVjpHNiWzoGudpyIlwMIWsRiRXeuxEQqk",
      authDomain: "classsense-1b1cd.firebaseapp.com",
      projectId: "classsense-1b1cd",
      storageBucket: "classsense-1b1cd.firebasestorage.app",
      messagingSenderId: "171751023325",
      appId: "1:171751023325:web:96074fa2db15b6d896b134",
      measurementId: "G-D37P2EYV04"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    /* ============ TOAST NOTIFICATION SYSTEM ============ */
    function showToast(type, title, message, duration = 4000) {
      const container = document.getElementById('toastContainer');
      const iconMap = {
        success: 'fa-circle-check',
        error: 'fa-circle-xmark',
        warning: 'fa-triangle-exclamation',
        info: 'fa-circle-info'
      };

      const toast = document.createElement('div');
      toast.className = `cs-toast cs-toast-${type}`;
      toast.innerHTML = `
        <i class="fa-solid ${iconMap[type] || iconMap.info}"></i>
        <div class="cs-toast-content">
          <div class="cs-toast-title">${title}</div>
          <div class="cs-toast-msg">${message}</div>
        </div>
        <button class="cs-toast-close" onclick="this.parentElement.classList.add('cs-toast-out'); setTimeout(() => this.parentElement.remove(), 300);">
          <i class="fa-solid fa-xmark"></i>
        </button>
      `;
      container.appendChild(toast);

      // Auto-dismiss
      setTimeout(() => {
        if (toast.parentElement) {
          toast.classList.add('cs-toast-out');
          setTimeout(() => toast.remove(), 300);
        }
      }, duration);
    }

    /* ============ HELPERS ============ */
    function getFormValues() {
      return {
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value.trim(),
        className: document.getElementById("className").value.trim().toUpperCase(),
        role: document.getElementById("teacherRole").value,
        fullName: document.getElementById("fullName").value.trim(),
        subject: document.getElementById("subjectName").value.trim()
      };
    }

    function toggleSubjectField() {
      const role = document.getElementById('teacherRole').value;
      const registerTab = document.getElementById('register-tab');
      const isRegisterActive = registerTab && registerTab.classList.contains('active');
      const subjectGroup = document.getElementById('subjectFieldGroup');
      subjectGroup.style.display = (role === 'Subject Teacher' && isRegisterActive) ? 'block' : 'none';
    }

    // Also toggle when switching tabs
    document.getElementById('login-tab').addEventListener('shown.bs.tab', toggleSubjectField);
    document.getElementById('register-tab').addEventListener('shown.bs.tab', toggleSubjectField);
    // Initial state: login tab is active, so hide it
    toggleSubjectField();

    async function checkClassTeacherExists(className) {
      const snapshot = await db.collection("teacher_roles")
        .where("class", "==", className)
        .where("role", "==", "Class Teacher")
        .get();
      return !snapshot.empty;
    }

    async function checkRoleExists(uid, role, className) {
      const snapshot = await db.collection("teacher_roles")
        .where("uid", "==", uid)
        .where("class", "==", className)
        .where("role", "==", role)
        .get();
      return !snapshot.empty;
    }

    async function registerTeacherRole(user, name, role, className, subject) {
      // Create/update user profile
      const userRef = db.collection("teachers").doc(user.uid);
      const userDoc = await userRef.get();
      if (!userDoc.exists) {
        await userRef.set({
          name: name || user.displayName || "Unknown Teacher",
          email: user.email,
          createdAt: new Date().toISOString()
        });
      }

      // Check if this specific role+class already exists
      const alreadyExists = await checkRoleExists(user.uid, role, className);
      if (alreadyExists) {
        return false; // Already registered
      }

      // Add the role
      const roleData = {
        uid: user.uid,
        email: user.email,
        role: role,
        class: className,
        createdAt: new Date().toISOString()
      };
      if (role === 'Subject Teacher' && subject) {
        roleData.subject = subject;
      }
      await db.collection("teacher_roles").add(roleData);
      return true; // Newly registered
    }

    function redirectToDashboard(role, className) {
      if (role === "Class Teacher") {
        window.location.href = `/teacher/class_dashboard.html?class=${encodeURIComponent(className)}`;
      } else {
        window.location.href = `/teacher/subject_dashboard.html?class=${encodeURIComponent(className)}`;
      }
    }

    /* ============ MAIN AUTH HANDLER ============ */
    async function handleAuthAction(actionType, method) {
      // Use SESSION persistence so each tab has isolated auth (Issue #2)
      await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.SESSION);
      const vals = getFormValues();

      if (!vals.className) {
        showToast('warning', 'Missing Field', 'Please specify the Class Name.');
        return;
      }

      if (actionType === 'register' && vals.role === 'Subject Teacher' && !vals.subject) {
        showToast('warning', 'Missing Field', 'Please specify the Subject Name for Subject Teacher role.');
        return;
      }

      // Validate for Class Teacher uniqueness
      if (vals.role === "Class Teacher") {
        const exists = await checkClassTeacherExists(vals.className);
        if (exists) {
          // Check if it's THIS user who owns it (they might be re-registering)
          // We'll handle this after authentication
        }
      }

      try {
        let user;

        if (actionType === 'register') {
          // ========== REGISTER FLOW ==========
          if (method === 'email') {
            if (!vals.email || !vals.password || !vals.fullName) {
              showToast('warning', 'Missing Fields', 'Please fill all fields for registration.');
              return;
            }

            // Try to create the account first
            try {
              const cred = await firebase.auth().createUserWithEmailAndPassword(vals.email, vals.password);
              user = cred.user;
            } catch (createErr) {
              if (createErr.code === 'auth/email-already-in-use') {
                // Account exists! Sign in instead and add the new role
                try {
                  const cred = await firebase.auth().signInWithEmailAndPassword(vals.email, vals.password);
                  user = cred.user;
                  showToast('info', 'Account Exists', 'You already have an account. Adding the new role...');
                } catch (loginErr) {
                  showToast('error', 'Login Failed', 'This email is already registered but the password is incorrect.');
                  return;
                }
              } else {
                throw createErr;
              }
            }
          } else {
            // Google register
            const result = await firebase.auth().signInWithPopup(provider);
            user = result.user;
          }

          // Now validate Class Teacher constraint
          if (vals.role === "Class Teacher") {
            const ctExists = await checkClassTeacherExists(vals.className);
            if (ctExists) {
              // Check if the existing CT is this same user
              const isOwnRole = await checkRoleExists(user.uid, "Class Teacher", vals.className);
              if (isOwnRole) {
                showToast('info', 'Already Registered', `You are already the Class Teacher for ${vals.className}. Logging you in...`);
                setTimeout(() => redirectToDashboard(vals.role, vals.className), 1500);
                return;
              } else {
                showToast('error', 'Role Taken', `${vals.className} already has a Class Teacher assigned. You cannot register for this role.`);
                return;
              }
            }
          }

          // Check if already registered for this exact role
          const alreadyHasRole = await checkRoleExists(user.uid, vals.role, vals.className);
          if (alreadyHasRole) {
            showToast('info', 'Already Registered', `You are already registered as a ${vals.role} for ${vals.className}. Logging you in...`);
            setTimeout(() => redirectToDashboard(vals.role, vals.className), 1500);
            return;
          }

          // Register the role
          await registerTeacherRole(user, vals.fullName || user.displayName, vals.role, vals.className, vals.subject);
          showToast('success', 'Registration Successful', `You are now registered as a ${vals.role} for ${vals.className}.`);
          setTimeout(() => redirectToDashboard(vals.role, vals.className), 1500);

        } else {
          // ========== LOGIN FLOW ==========
          if (method === 'email') {
            if (!vals.email || !vals.password) {
              showToast('warning', 'Missing Fields', 'Please enter your email and password.');
              return;
            }
            const cred = await firebase.auth().signInWithEmailAndPassword(vals.email, vals.password);
            user = cred.user;
          } else {
            // Google login
            const result = await firebase.auth().signInWithPopup(provider);
            user = result.user;
          }

          // Verify if they have this role
          const hasRole = await checkRoleExists(user.uid, vals.role, vals.className);

          if (!hasRole) {
            showToast('error', 'Not Registered', `You are not registered as a ${vals.role} for ${vals.className}. Please register first using the Register tab.`);
            await firebase.auth().signOut();
            return;
          }

          showToast('success', 'Login Successful', `Welcome back! Redirecting to your ${vals.role} dashboard...`);
          setTimeout(() => redirectToDashboard(vals.role, vals.className), 1200);
        }

      } catch (err) {
        console.error("AUTH ERROR:", err);
        let msg = err.message || "Authentication failed.";
        // Make Firebase errors more user-friendly
        if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
          msg = "Invalid email or password. Please try again.";
        } else if (err.code === 'auth/user-not-found') {
          msg = "No account found with this email. Please register first.";
        } else if (err.code === 'auth/weak-password') {
          msg = "Password is too weak. Use at least 6 characters.";
        } else if (err.code === 'auth/invalid-email') {
          msg = "Please enter a valid email address.";
        } else if (err.code === 'auth/popup-closed-by-user') {
          msg = "Google sign-in was cancelled. Please try again.";
        }
        showToast('error', 'Authentication Error', msg);
      }
    }

    // Bindings
    document.getElementById("loginBtn").onclick = () => handleAuthAction('login', 'email');
    document.getElementById("googleLoginBtn").onclick = () => handleAuthAction('login', 'google');
    document.getElementById("registerBtn").onclick = () => handleAuthAction('register', 'email');
    document.getElementById("googleRegisterBtn").onclick = () => handleAuthAction('register', 'google');

  </script>
</body>

</html>
