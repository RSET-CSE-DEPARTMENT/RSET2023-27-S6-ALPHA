<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ClassSense – Subject Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body {
      background: radial-gradient(circle at top left, #e0edff 0, #f8fafc 42%, #eff6ff 100%);
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .cs-hero-card {
      border-radius: 1.5rem;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
    }
    .cs-badge-soft {
      border-radius: 999px;
      padding: 0.2rem 0.8rem;
      background: #e0edff;
      color: #1d4ed8;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .class-card {
      border-radius: 1rem;
      border: 1px solid #e2e8f0;
      background: #fff;
      transition: all 0.2s;
    }
    .class-card:hover {
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
      transform: translateY(-2px);
    }

    /* Toast system */
    .cs-toast-container { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.75rem; max-width: 400px; }
    .cs-toast { padding: 1rem 1.25rem; border-radius: 0.85rem; color: #fff; font-size: 0.9rem; display: flex; align-items: flex-start; gap: 0.75rem; box-shadow: 0 8px 24px rgba(0,0,0,0.25); animation: csToastIn 0.35s ease; border: 1px solid rgba(255,255,255,0.1); }
    .cs-toast.cs-toast-out { animation: csToastOut 0.3s ease forwards; }
    .cs-toast-success { background: rgba(22, 101, 52, 0.92); }
    .cs-toast-error { background: rgba(153, 27, 27, 0.92); }
    .cs-toast-warning { background: rgba(146, 64, 14, 0.92); }
    .cs-toast-info { background: rgba(30, 64, 175, 0.92); }
    .cs-toast i { font-size: 1.1rem; margin-top: 0.1rem; }
    .cs-toast-content { flex: 1; }
    .cs-toast-title { font-weight: 600; margin-bottom: 0.15rem; }
    .cs-toast-msg { font-size: 0.82rem; opacity: 0.9; }
    .cs-toast-close { background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 1rem; padding: 0; }
    .cs-toast-close:hover { color: #fff; }
    @keyframes csToastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes csToastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(40px); } }

    /* Confirm modal */
    .cs-confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9998; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s ease; }
    .cs-confirm-box { background: #fff; border-radius: 1rem; padding: 2rem; max-width: 420px; width: 90%; box-shadow: 0 12px 40px rgba(0,0,0,0.2); text-align: center; }
    .cs-confirm-box h5 { color: #0f172a; font-weight: 700; margin-bottom: 0.75rem; }
    .cs-confirm-box p { color: #475569; font-size: 0.9rem; margin-bottom: 1.5rem; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>

<body>
  <div class="cs-toast-container" id="toastContainer"></div>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-xl-9 col-lg-10">
        <div class="cs-hero-card p-4 p-md-5">
          <!-- Header -->
          <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
            <div class="d-flex align-items-center gap-3">
              <div class="rounded-circle bg-primary-subtle text-primary d-inline-flex align-items-center justify-content-center" style="width:48px;height:48px;font-size:1.2rem;">
                <i class="fa-solid fa-chalkboard-user"></i>
              </div>
              <div>
                <h4 class="mb-0 fw-bold">Subject Teacher Dashboard</h4>
                <div class="text-muted small" id="teacherNameDisplay">Loading...</div>
              </div>
            </div>
            <div>
              <button class="btn btn-outline-danger btn-sm me-2" id="deleteAccountBtn">
                <i class="fa-solid fa-user-xmark me-1"></i> Delete Subject Roles
              </button>
              <button class="btn btn-outline-secondary btn-sm" id="logoutBtn">
                <i class="fa-solid fa-arrow-right-from-bracket me-1"></i> Logout
              </button>
            </div>
          </div>

          <!-- Main Content -->
          <div class="row g-4">
            
            <!-- Left Column: Manage Classes -->
            <div class="col-md-7">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="cs-badge-soft d-inline-flex align-items-center gap-1">
                  <i class="fa-solid fa-layer-group"></i> My Assigned Classes
                </span>
                <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#addClassModal">
                  <i class="fa-solid fa-plus me-1"></i> Add Class
                </button>
              </div>

              <div id="classesList" class="d-grid gap-3">
                <div class="text-center text-muted py-4 small" id="loadingClasses">Loading classes...</div>
              </div>
            </div>

            <!-- Right Column: Reports -->
            <div class="col-md-5">
              <div class="p-4 rounded-4 bg-light border">
                <h6 class="fw-bold mb-3"><i class="fa-solid fa-chart-pie text-primary me-2"></i>Recent Reports</h6>
                <div class="small text-muted mb-3">
                  Analysis of previous classes and attention scores across your subjects.
                </div>
                
                <div id="reportsList" class="d-grid gap-2">
                  <div class="text-center text-muted py-3 small">No recent sessions found.</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Class Modal -->
  <div class="modal fade" id="addClassModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg rounded-4">
        <div class="modal-header border-bottom-0 pb-0">
          <h5 class="modal-title fw-bold">Add Assigned Class</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label small fw-semibold text-muted">Class Name</label>
            <input type="text" id="newClassName" class="form-control" placeholder="e.g. CS-B">
          </div>
          <div class="mb-4">
            <label class="form-label small fw-semibold text-muted">Subject ID/Name</label>
            <input type="text" id="newSubjectName" class="form-control" placeholder="e.g. CS201 Data Structures">
          </div>
          <button type="button" class="btn btn-primary w-100" id="confirmAddClassBtn">Add Class</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBVjpHNiWzoGudpyIlwMIWsRiRXeuxEQqk",
      authDomain: "classsense-1b1cd.firebaseapp.com",
      projectId: "classsense-1b1cd",
      storageBucket: "classsense-1b1cd.firebasestorage.app",
      messagingSenderId: "171751023325",
      appId: "1:171751023325:web:96074fa2db15b6d896b134",
      measurementId: "G-D37P2EYV04"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentUser = null;

    /* ===== TOAST SYSTEM ===== */
    function showToast(type, title, message, duration = 4000) {
      const container = document.getElementById('toastContainer');
      const iconMap = { success: 'fa-circle-check', error: 'fa-circle-xmark', warning: 'fa-triangle-exclamation', info: 'fa-circle-info' };
      const toast = document.createElement('div');
      toast.className = `cs-toast cs-toast-${type}`;
      toast.innerHTML = `
        <i class="fa-solid ${iconMap[type] || iconMap.info}"></i>
        <div class="cs-toast-content">
          <div class="cs-toast-title">${title}</div>
          <div class="cs-toast-msg">${message}</div>
        </div>
        <button class="cs-toast-close" onclick="this.parentElement.classList.add('cs-toast-out'); setTimeout(() => this.parentElement.remove(), 300);">
          <i class="fa-solid fa-xmark"></i>
        </button>
      `;
      container.appendChild(toast);
      setTimeout(() => { if (toast.parentElement) { toast.classList.add('cs-toast-out'); setTimeout(() => toast.remove(), 300); } }, duration);
    }

    /* ===== CONFIRM DIALOG ===== */
    function showConfirm(title, message) {
      return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.className = 'cs-confirm-overlay';
        overlay.innerHTML = `
          <div class="cs-confirm-box">
            <h5>${title}</h5>
            <p>${message}</p>
            <div class="d-flex gap-2 justify-content-center">
              <button class="btn btn-outline-secondary px-4" id="confirmNo">Cancel</button>
              <button class="btn btn-danger px-4" id="confirmYes">Yes, Delete</button>
            </div>
          </div>
        `;
        document.body.appendChild(overlay);
        overlay.querySelector('#confirmYes').onclick = () => { overlay.remove(); resolve(true); };
        overlay.querySelector('#confirmNo').onclick = () => { overlay.remove(); resolve(false); };
      });
    }

    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = "/teacher/login";
        return;
      }
      currentUser = user;
      document.getElementById('teacherNameDisplay').innerText = user.email;
      loadClasses();
      loadReports();
    });

    async function loadClasses() {
      const container = document.getElementById('classesList');
      container.innerHTML = `<div class="text-center text-muted py-4 small">Loading classes...</div>`;
      
      try {
        const snapshot = await db.collection('teacher_roles')
          .where('uid', '==', currentUser.uid)
          .where('role', '==', 'Subject Teacher')
          .get();
        
        container.innerHTML = '';
        if (snapshot.empty) {
          container.innerHTML = `<div class="text-center text-muted py-4 small border rounded bg-light">No classes assigned yet. Click "Add Class" to start.</div>`;
          return;
        }

        snapshot.forEach(doc => {
          const data = doc.data();
          const cardId = doc.id;
          const card = document.createElement('div');
          card.className = 'class-card p-3 d-flex justify-content-between align-items-center';
          card.innerHTML = `
            <div>
              <h6 class="mb-1 fw-bold">${data.class}</h6>
              <div class="small text-muted">${data.subject || 'General Subject'}</div>
            </div>
            <div class="d-flex gap-2">
              <button class="btn btn-sm btn-outline-danger px-2" onclick="deleteClass('${cardId}', '${data.class}')" title="Remove Class">
                <i class="fa-regular fa-trash-can"></i>
              </button>
              <button class="btn btn-sm btn-outline-secondary px-3" onclick="openAnalytics('${data.class}', '${data.subject || 'General'}')">
                <i class="fa-solid fa-chart-line me-1"></i> Analytics
              </button>
              <button class="btn btn-sm btn-primary px-3" onclick="startSession('${data.class}', '${data.subject || 'Subject'}')">
                <i class="fa-solid fa-play me-1"></i> Start
              </button>
            </div>
          `;
          container.appendChild(card);
        });
      } catch (err) {
        console.error(err);
        container.innerHTML = `<div class="text-danger small">Error loading classes.</div>`;
      }
    }

    async function loadReports() {
      const container = document.getElementById('reportsList');
      try {
        const snapshot = await db.collection('session_history')
          .where('teacherUid', '==', currentUser.uid)
          .get();
        
        if (snapshot.empty) {
          container.innerHTML = `<div class="text-center text-muted py-3 small">No recent sessions found.</div>`;
          return;
        }

        const docs = [];
        snapshot.forEach(d => docs.push(d));

        docs.sort((a, b) => {
          const da = (a.data().endedAt || a.data().createdAt || '');
          const dbv = (b.data().endedAt || b.data().createdAt || '');
          return dbv.localeCompare(da);
        });

        container.innerHTML = '';
        docs.slice(0, 5).forEach(docSnap => {
          const data = docSnap.data();
          const sessionId = docSnap.id;
          const date = new Date(data.endedAt || data.createdAt).toLocaleDateString();
          const students = data.students || [];
          const avgAtt = data.averageAttention != null
            ? data.averageAttention
            : (students.length > 0
                ? Math.round(students.reduce((a, s) => a + (s.attentionScore || 0), 0) / students.length)
                : 0);
          const div = document.createElement('div');
          div.className = 'p-2 border rounded bg-white small d-flex justify-content-between align-items-center';
          div.innerHTML = `
            <div>
              <span class="fw-semibold">${data.className || 'Unknown'}</span> — <span class="text-muted">${data.subject || ''}</span>
              <div class="text-muted" style="font-size:0.75rem">${date} · ${students.length} students · Avg: ${avgAtt}%</div>
            </div>
            <div class="d-flex flex-column align-items-end gap-1">
              <button class="btn btn-link btn-sm p-0" onclick="openAnalytics('${data.className || ''}', '${data.subject || ''}')">
                View Analytics
              </button>
              <button class="btn btn-link btn-sm p-0" onclick="downloadReport('${sessionId}')">
                Download CSV
              </button>
            </div>
          `;
          container.appendChild(div);
        });

      } catch (err) {
        console.error(err);
        container.innerHTML = `
          <div class="text-center text-muted py-3 small">
            Error loading reports. You can still <span class="link-primary" style="cursor:pointer;" onclick="loadReports()">retry</span> or open analytics from your class cards.
          </div>`;
      }
    }

    document.getElementById('confirmAddClassBtn').onclick = async () => {
      const cName = document.getElementById('newClassName').value.trim().toUpperCase();
      const sName = document.getElementById('newSubjectName').value.trim();
      if (!cName) { showToast('warning', 'Missing Field', 'Class Name is required.'); return; }
      
      const btn = document.getElementById('confirmAddClassBtn');
      btn.disabled = true;
      btn.innerText = "Adding...";
      
      try {
        await db.collection("teacher_roles").add({
          uid: currentUser.uid,
          email: currentUser.email,
          role: "Subject Teacher",
          class: cName,
          subject: sName || "General",
          createdAt: new Date().toISOString()
        });
        
        document.getElementById('newClassName').value = '';
        document.getElementById('newSubjectName').value = '';
        bootstrap.Modal.getInstance(document.getElementById('addClassModal')).hide();
        showToast('success', 'Class Added', `${cName} has been added to your assigned classes.`);
        loadClasses();
        
      } catch (e) {
        showToast('error', 'Error', 'Failed to add class: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.innerText = "Add Class";
      }
    };

    window.deleteClass = async (docId, className) => {
      const confirmed = await showConfirm('Remove Class', `Are you sure you want to remove <strong>${className}</strong> from your classes?`);
      if (confirmed) {
        try {
          await db.collection("teacher_roles").doc(docId).delete();
          showToast('success', 'Class Removed', `${className} has been removed from your list.`);
          loadClasses();
        } catch (e) {
          showToast('error', 'Error', e.message);
        }
      }
    };

    window.startSession = async (className, subject) => {
      try {
        const res = await fetch("/start-session", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ subject: subject, className: className, teacherUid: currentUser.uid })
        });
        const data = await res.json();
        
        if (data.sessionCode) {
          window.location.href = "/" + data.sessionCode;
        } else {
          showToast('error', 'Session Error', 'Failed to start session.');
        }
      } catch(e) {
        showToast('error', 'Server Error', e.message);
      }
    };

    window.openAnalytics = (className, subject) => {
      const params = new URLSearchParams();
      if (className) params.append('class', className);
      if (subject) params.append('subject', subject);
      window.location.href = `/teacher/class_analytics.html?${params.toString()}`;
    };

    window.downloadReport = (sessionId) => {
      if (!sessionId) return;
      window.open(`/api/analytics/session/${encodeURIComponent(sessionId)}/download`, '_blank');
    };

    document.getElementById('logoutBtn').onclick = async () => {
      await firebase.auth().signOut();
      window.location.href = "/teacher/login";
    };

    document.getElementById('deleteAccountBtn').onclick = async () => {
      const confirmed = await showConfirm(
        'Delete Subject Teacher Roles',
        'This will remove <strong>all</strong> your Subject Teacher roles. If you have a Class Teacher role, it will remain. Continue?'
      );
      if (confirmed) {
        try {
          const uid = currentUser.uid;
          
          const res = await fetch("/api/teacher/delete", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ uid: uid, role: "Subject Teacher" })
          });
          const json = await res.json();
          if (json.success) {
            showToast('success', 'Roles Deleted', 'Your Subject Teacher roles have been removed.');
            // Always redirect to login after role deletion
            setTimeout(async () => {
              await firebase.auth().signOut();
              window.location.href = "/teacher/login";
            }, 1500);
          } else {
            showToast('error', 'Delete Failed', json.error);
          }
        } catch(e) {
          showToast('error', 'Server Error', 'Could not delete roles. Check server logs.');
        }
      }
    };
  </script>
</body>
</html>
