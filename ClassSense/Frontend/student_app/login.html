<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>ClassSense – Student Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #e0edff 0, #020617 40%, #020617 100%);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .cs-card {
      background: rgba(15, 23, 42, 0.92);
      border-radius: 1.25rem;
      border: 1px solid rgba(148, 163, 184, 0.35);
      box-shadow: 0 24px 64px rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(18px);
    }

    .form-control,
    .form-control:focus {
      background: #020617;
      border-color: #1e293b;
      color: #e5e7eb;
    }

    .form-control::placeholder {
      color: #6b7280;
    }

    /* Toast system */
    .cs-toast-container {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-width: 400px;
    }

    .cs-toast {
      padding: 1rem 1.25rem;
      border-radius: 0.85rem;
      color: #fff;
      font-size: 0.9rem;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      animation: csToastIn 0.35s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .cs-toast.cs-toast-out {
      animation: csToastOut 0.3s ease forwards;
    }

    .cs-toast-success {
      background: rgba(22, 101, 52, 0.92);
    }

    .cs-toast-error {
      background: rgba(153, 27, 27, 0.92);
    }

    .cs-toast-warning {
      background: rgba(146, 64, 14, 0.92);
    }

    .cs-toast-info {
      background: rgba(30, 64, 175, 0.92);
    }

    .cs-toast i {
      font-size: 1.1rem;
      margin-top: 0.1rem;
    }

    .cs-toast-content {
      flex: 1;
    }

    .cs-toast-title {
      font-weight: 600;
      margin-bottom: 0.15rem;
    }

    .cs-toast-msg {
      font-size: 0.82rem;
      opacity: 0.9;
    }

    .cs-toast-close {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
    }

    .cs-toast-close:hover {
      color: #fff;
    }

    @keyframes csToastIn {
      from {
        opacity: 0;
        transform: translateX(40px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes csToastOut {
      from {
        opacity: 1;
        transform: translateX(0);
      }

      to {
        opacity: 0;
        transform: translateX(40px);
      }
    }
  </style>
</head>

<body>

  <div class="cs-toast-container" id="toastContainer"></div>

  <div class="container px-3">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="cs-card p-4 p-md-5">

          <div class="d-flex align-items-center gap-2 mb-3">
            <div
              class="rounded-circle bg-primary-subtle text-primary d-inline-flex align-items-center justify-content-center"
              style="width:34px;height:34px;">
              <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <div>
              <div class="fw-semibold text-primary">ClassSense</div>
              <div class="small text-secondary">Student Login</div>
            </div>
          </div>

          <h1 class="h4 mb-2">Welcome, student</h1>
          <p class="small text-secondary mb-4">
            Login with your Rajagiri email.
          </p>

          <div id="classSection" style="display:none">

            <div class="mb-3">
              <label class="form-label small text-secondary">Class</label>
              <select id="studentClass" class="form-control form-control-sm">
                <option value="">Select Class</option>
                <option value="S4 CS">S4 CS</option>
                <option value="S4 EC">S4 EC</option>
                <option value="S6 CS">S6 CS</option>
                <option value="S6 EC">S6 EC</option>
              </select>
            </div>

            <button id="saveClassBtn" class="btn btn-success btn-sm w-100">
              Save Class
            </button>

          </div>

          <div class="d-grid mb-3 mt-3">
            <button id="loginBtn" class="btn btn-primary btn-sm">
              <i class="fa-brands fa-google me-2"></i>
              Login with Rajagiri Email
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script>

    const firebaseConfig = {
      apiKey: "AIzaSyBVjpHNiWzoGudpyIlwMIWsRiRXeuxEQqk",
      authDomain: "classsense-1b1cd.firebaseapp.com",
      projectId: "classsense-1b1cd",
      storageBucket: "classsense-1b1cd.firebasestorage.app",
      messagingSenderId: "171751023325",
      appId: "1:171751023325:web:96074fa2db15b6d896b134"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    /* ===== TOAST SYSTEM ===== */
    function showToast(type, title, message, duration = 4000) {
      const container = document.getElementById('toastContainer');
      const iconMap = { success: 'fa-circle-check', error: 'fa-circle-xmark', warning: 'fa-triangle-exclamation', info: 'fa-circle-info' };
      const toast = document.createElement('div');
      toast.className = `cs-toast cs-toast-${type}`;
      toast.innerHTML = `
    <i class="fa-solid ${iconMap[type] || iconMap.info}"></i>
    <div class="cs-toast-content">
      <div class="cs-toast-title">${title}</div>
      <div class="cs-toast-msg">${message}</div>
    </div>
    <button class="cs-toast-close" onclick="this.parentElement.classList.add('cs-toast-out'); setTimeout(() => this.parentElement.remove(), 300);">
      <i class="fa-solid fa-xmark"></i>
    </button>
  `;
      container.appendChild(toast);
      setTimeout(() => { if (toast.parentElement) { toast.classList.add('cs-toast-out'); setTimeout(() => toast.remove(), 300); } }, duration);
    }

    let currentUser = null;
    let studentId = null;
    let studentName = null;

    document.getElementById("loginBtn").onclick = async () => {

      const result = await firebase.auth().signInWithPopup(provider);
      const user = result.user;

      if (!user.email.endsWith("@rajagiri.edu.in")) {
        showToast('error', 'Invalid Email', 'Only Rajagiri email addresses are allowed.');
        await firebase.auth().signOut();
        return;
      }

      studentName = user.displayName;
      studentId = user.email.split("@")[0];

      const studentRef = db.collection("students").doc(studentId);
      const doc = await studentRef.get();

      if (doc.exists) {

        localStorage.setItem("studentId", studentId);
        localStorage.setItem("studentName", studentName);

        window.location.href = "home.html?name=" + studentName + "&id=" + studentId + "&loggedIn=1";

      } else {

        currentUser = user;
        document.getElementById("classSection").style.display = "block";

      }

    };

    document.getElementById("saveClassBtn").onclick = async () => {

      const studentClass = document.getElementById("studentClass").value;

      if (!studentClass) {
        showToast('warning', 'Missing Field', 'Please select your class before saving.');
        return;
      }

      await db.collection("students").doc(studentId).set({
        name: studentName,
        email: currentUser.email,
        class: studentClass,
        createdAt: new Date().toISOString()
      });

      await db.collection("Unq_Student").doc(studentId).set({
        created: true
      });

      localStorage.setItem("studentId", studentId);
      localStorage.setItem("studentName", studentName);

      window.location.href = "home.html?name=" + studentName + "&id=" + studentId + "&loggedIn=1";

    };

  </script>

</body>

</html>
