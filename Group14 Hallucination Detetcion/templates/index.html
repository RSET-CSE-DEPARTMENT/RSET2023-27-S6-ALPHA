<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HalluGuard — Hallucination Detector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0e14;
      --surface: #131720;
      --surface-2: #1a1f2e;
      --border: rgba(255,255,255,0.06);
      --text: #e2e8f0;
      --text-muted: #8b95a8;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.25);
      --green: #22c55e;
      --green-bg: rgba(34,197,94,0.12);
      --red: #ef4444;
      --red-bg: rgba(239,68,68,0.10);
      --yellow: #eab308;
      --yellow-bg: rgba(234,179,8,0.10);
      --radius: 14px;
      --font: 'Inter', -apple-system, sans-serif;
    }

    html { font-size: 15px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Animated gradient blob background ─────── */
    body::before {
      content: '';
      position: fixed;
      top: -40%;  left: -20%;
      width: 80vw; height: 80vw;
      background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: floatBlob 18s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes floatBlob {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(20vw, 30vh) scale(1.2); }
    }

    /* ── Layout ────────────────────────────────── */
    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 820px;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* ── Header ────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .header .logo {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .header .tagline {
      color: var(--text-muted);
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    /* ── Card ──────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 30px rgba(0,0,0,0.35);
    }

    /* ── Form ──────────────────────────────────── */
    label {
      display: block;
      font-weight: 600;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      margin-bottom: 0.45rem;
    }
    textarea {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.92rem;
      padding: 0.85rem 1rem;
      resize: vertical;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 1.3rem;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    textarea::placeholder { color: #4b5563; }

    .btn-row { display: flex; gap: 0.8rem; flex-wrap: wrap; }

    button {
      font-family: var(--font);
      font-weight: 600;
      font-size: 0.92rem;
      border: none;
      border-radius: 10px;
      padding: 0.75rem 1.6rem;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.2s, opacity 0.2s;
    }
    button:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #818cf8);
      color: #fff;
      box-shadow: 0 4px 18px var(--accent-glow);
    }
    .btn-primary:hover { box-shadow: 0 6px 28px var(--accent-glow); }
    .btn-primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--surface-2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { color: var(--text); }

    .btn-demo {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      font-size: 0.82rem;
      padding: 0.6rem 1.2rem;
    }
    .btn-demo:hover { background: var(--accent-glow); }

    /* ── Spinner ───────────────────────────────── */
    .spinner {
      display: none;
      text-align: center;
      padding: 2rem 0;
      color: var(--text-muted);
    }
    .spinner.active { display: block; }
    .spinner .dots span {
      display: inline-block;
      width: 10px; height: 10px;
      margin: 0 4px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.4s infinite both;
    }
    .spinner .dots span:nth-child(2) { animation-delay: 0.16s; }
    .spinner .dots span:nth-child(3) { animation-delay: 0.32s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* ── Results ───────────────────────────────── */
    #results { display: none; }
    #results.visible { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.2rem;
    }
    .result-badge {
      font-weight: 700;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0.35rem 0.9rem;
      border-radius: 20px;
    }
    .badge-safe  { background: var(--green-bg);  color: var(--green); }
    .badge-hallucinated { background: var(--red-bg); color: var(--red); }

    .result-score {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .result-summary {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 1.4rem;
      line-height: 1.55;
    }

    /* highlighted answer */
    .answer-display {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      font-size: 0.93rem;
      line-height: 1.7;
      margin-bottom: 1.4rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .answer-display .hl {
      background: var(--red-bg);
      color: var(--red);
      border-bottom: 2px solid var(--red);
      padding: 1px 3px;
      border-radius: 3px;
      cursor: help;
      position: relative;
    }
    .answer-display .hl .tooltip {
      display: none;
      position: absolute;
      bottom: 130%;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2030;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.78rem;
      padding: 0.35rem 0.65rem;
      border-radius: 8px;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      z-index: 10;
    }
    .answer-display .hl:hover .tooltip { display: block; }

    /* Spans table */
    .spans-title {
      font-weight: 700;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 0.7rem;
    }
    .span-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1.1rem;
      margin-bottom: 0.6rem;
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 1rem;
    }
    .span-text {
      flex: 1;
      font-size: 0.9rem;
      color: var(--red);
      line-height: 1.5;
    }
    .span-meta {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-align: right;
      white-space: nowrap;
    }
    .conf-bar-bg {
      width: 80px; height: 6px;
      background: var(--surface);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 4px;
    }
    .conf-bar {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--yellow), var(--red));
    }

    /* ── Footer ───────────────────────────────── */
    .footer {
      text-align: center;
      color: #4b5563;
      font-size: 0.78rem;
      padding: 1rem 0 2rem;
    }

    /* ── Responsive ───────────────────────────── */
    @media (max-width: 600px) {
      .container { padding: 1.4rem 1rem 3rem; }
      .card { padding: 1.4rem; }
      .header .logo { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- HEADER -->
    <header class="header">
      <div class="logo">🛡️ HalluGuard</div>
      <p class="tagline">Paste context, question &amp; answer — detect hallucinations instantly</p>
    </header>

    <!-- INPUT FORM -->
    <div class="card" id="inputCard">
      <label for="ctx">Context (reference text the answer should be based on)</label>
      <textarea id="ctx" rows="5" placeholder="e.g. France is a country in Europe. The capital of France is Paris. The population of France is 67 million."></textarea>

      <label for="q">Question</label>
      <textarea id="q" rows="2" placeholder="e.g. What is the capital of France? What is the population of France?"></textarea>

      <label for="a">Answer (to check for hallucinations)</label>
      <textarea id="a" rows="3" placeholder="e.g. The capital of France is Berlin. The population of France is 69 million."></textarea>

      <div class="btn-row">
        <button class="btn-primary" id="detectBtn" onclick="runDetection()">🔍 Detect Hallucinations</button>
        <button class="btn-secondary" onclick="clearAll()">Clear</button>
        <button class="btn-demo" onclick="loadDemo()">Load Demo</button>
      </div>
    </div>

    <!-- LOADING SPINNER -->
    <div class="spinner" id="spinner">
      <div class="dots"><span></span><span></span><span></span></div>
      <p style="margin-top:0.8rem;">Analyzing with HalluGuard model …</p>
    </div>

    <!-- RESULTS -->
    <div id="results">
      <div class="card">
        <div class="result-header">
          <span class="result-badge" id="badge"></span>
          <span class="result-score" id="scoreText"></span>
        </div>
        <p class="result-summary" id="summaryText"></p>

        <label>Answer with highlighted hallucinations</label>
        <div class="answer-display" id="answerDisplay"></div>

        <div id="spansSection" style="display:none;">
          <p class="spans-title">Hallucinated Spans</p>
          <div id="spansList"></div>
        </div>
      </div>
    </div>

    <footer class="footer">HalluGuard · Powered by ModernBERT Token Classifier</footer>
  </div>

  <script>
    /* ── Demo data ─────────────────────────────── */
    function loadDemo() {
      document.getElementById('ctx').value =
        'France is a country in Europe. The capital of France is Paris. The population of France is 67 million.';
      document.getElementById('q').value =
        'What is the capital of France? What is the population of France?';
      document.getElementById('a').value =
        'The capital of France is Berlin. The population of France is 69 million.';
    }

    function clearAll() {
      document.getElementById('ctx').value = '';
      document.getElementById('q').value = '';
      document.getElementById('a').value = '';
      document.getElementById('results').classList.remove('visible');
    }

    /* ── Main detection call ───────────────────── */
    async function runDetection() {
      const context  = document.getElementById('ctx').value.trim();
      const question = document.getElementById('q').value.trim();
      const answer   = document.getElementById('a').value.trim();

      if (!context || !question || !answer) {
        alert('Please fill in all three fields.');
        return;
      }

      const btn     = document.getElementById('detectBtn');
      const spinner = document.getElementById('spinner');
      const results = document.getElementById('results');

      btn.disabled = true;
      results.classList.remove('visible');
      spinner.classList.add('active');

      try {
        const res = await fetch('/api/detect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ context, question, answer }),
        });
        const data = await res.json();

        if (data.error) {
          alert('Error: ' + data.error);
          return;
        }

        renderResults(data, answer);
      } catch (err) {
        alert('Request failed: ' + err.message);
      } finally {
        btn.disabled = false;
        spinner.classList.remove('active');
      }
    }

    /* ── Render ────────────────────────────────── */
    function renderResults(data, rawAnswer) {
      const badge      = document.getElementById('badge');
      const scoreText  = document.getElementById('scoreText');
      const summaryEl  = document.getElementById('summaryText');
      const answerEl   = document.getElementById('answerDisplay');
      const spansSection = document.getElementById('spansSection');
      const spansList  = document.getElementById('spansList');

      // Badge
      if (data.hallucination_detected) {
        badge.textContent = '⚠ Hallucination Detected';
        badge.className = 'result-badge badge-hallucinated';
      } else {
        badge.textContent = '✓ Consistent';
        badge.className = 'result-badge badge-safe';
      }

      // Score & summary
      scoreText.textContent = `Overall score: ${(data.overall_score * 100).toFixed(1)}%`;
      summaryEl.textContent = data.summary;

      // Highlighted answer
      answerEl.innerHTML = highlightAnswer(rawAnswer, data.spans);

      // Spans list
      spansList.innerHTML = '';
      if (data.spans.length > 0) {
        spansSection.style.display = 'block';
        data.spans.forEach(sp => {
          const card = document.createElement('div');
          card.className = 'span-card';
          card.innerHTML = `
            <div class="span-text">"${escapeHtml(sp.text)}"</div>
            <div class="span-meta">
              <div>${(sp.confidence * 100).toFixed(1)}%</div>
              <div class="conf-bar-bg"><div class="conf-bar" style="width:${(sp.confidence * 100).toFixed(0)}%"></div></div>
              <div style="margin-top:2px;">pos ${sp.start}–${sp.end}</div>
            </div>`;
          spansList.appendChild(card);
        });
      } else {
        spansSection.style.display = 'none';
      }

      document.getElementById('results').classList.add('visible');
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function highlightAnswer(answer, spans) {
      if (!spans || spans.length === 0) return escapeHtml(answer);

      // Sort spans by start position
      const sorted = [...spans].sort((a, b) => a.start - b.start);
      let result = '';
      let cursor = 0;

      sorted.forEach(sp => {
        // Text before this span
        if (sp.start > cursor) {
          result += escapeHtml(answer.slice(cursor, sp.start));
        }
        // The hallucinated span
        const conf = (sp.confidence * 100).toFixed(1);
        result += `<span class="hl">${escapeHtml(answer.slice(sp.start, sp.end))}<span class="tooltip">Confidence: ${conf}%</span></span>`;
        cursor = sp.end;
      });

      // Remaining text after last span
      if (cursor < answer.length) {
        result += escapeHtml(answer.slice(cursor));
      }
      return result;
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }
  </script>
</body>
</html>
